<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Internet — AI Archaeologist</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Animated Gradients -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    
    <div class="container">
        <header>
            <div class="logo-box">
                <span class="icon">👻</span>
                <h1>Ghost Internet</h1>
            </div>
            <p class="subtitle">Discover forgotten ideas from the internet.</p>
        </header>

        <main>
            <div class="search-section">
                <form id="discoveryForm">
                    <div class="input-group">
                        <input type="text" id="topicInput" placeholder="e.g., forgotten renewable energy inventions" required autocomplete="off">
                        <button type="submit" id="searchBtn">
                            <span>Unearth</span>
                            <div class="loader" id="btnLoader"></div>
                        </button>
                    </div>
                </form>
            </div>

            <div id="statusMessage" class="status-msg hidden">
                <div class="scan-line"></div>
                <p>Agent <span class="highlight">ghost-internet-archaeologist</span> is deploying drones to the ancient web...</p>
            </div>

            <div id="resultsPanel" class="results-panel hidden">
                <div class="agent-badge">
                    <div class="pulse-dot"></div> AI Analysis Complete
                </div>

                <div id="analysisContent">
                    <!-- Dynamic sections generated by JS here -->
                </div>

                <div class="sources-section">
                    <h3>Excavated Sources</h3>
                    <ul id="sourcesList">
                        <!-- Source links -->
                    </ul>
                </div>
                
                <!-- Placeholder enhancements hooks ready in the application 
                     <div class="impact-score-widget"></div>
                     <div class="timeline-visualizer"></div>
                -->
            </div>
        </main>
        
        <footer>
            <p>Powered by DigitalOcean Gradient AI &nbsp;•&nbsp; Hackathon Submission</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
